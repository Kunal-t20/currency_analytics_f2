<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="arrow1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#00e676"/>
    </linearGradient>
    <linearGradient id="arrow2" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00c6ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="rgba(255,255,255,0.04)"/>

  <!-- Top arrow: left to right (→) -->
  <path d="M12 22 L40 22" stroke="url(#arrow1)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M34 15 L42 22 L34 29" stroke="url(#arrow1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bottom arrow: right to left (←) -->
  <path d="M52 42 L24 42" stroke="url(#arrow2)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M30 49 L22 42 L30 35" stroke="url(#arrow2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
